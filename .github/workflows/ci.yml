name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: biosync_test
          POSTGRES_USER: biosync_user
          POSTGRES_PASSWORD: biosync_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install backend dependencies
      working-directory: ./middleware
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 mypy

    - name: Lint with flake8
      working-directory: ./middleware
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type check with mypy
      working-directory: ./middleware
      run: |
        mypy api/ engine/ --ignore-missing-imports

    - name: Run backend tests
      working-directory: ./middleware
      env:
        DATABASE_URL: postgresql://biosync_user:biosync_test_password@localhost:5432/biosync_test
        JWT_SECRET: test-secret
        ENVIRONMENT: test
      run: |
        pytest tests/ -v --cov=api --cov=engine --cov-report=term-missing

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint with ESLint
      working-directory: ./frontend
      run: npm run lint

    - name: Type check with TypeScript
      working-directory: ./frontend
      run: npm run typecheck

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test -- --watch=false --browsers=ChromeHeadless

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker images
      run: |
        docker-compose build

    - name: Test Docker Compose startup
      run: |
        cp .env.example .env
        docker-compose up -d
        sleep 10
        docker-compose ps
        curl -f http://localhost:8000/health || exit 1
        docker-compose down
